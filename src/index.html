// ---- AUDIO ENGINE ----
function getAC(){
  if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function stopAudio(){
  if(!AC||!BN.master)return;
  try{BN.master.gain.linearRampToValueAtTime(0,AC.currentTime+1.5);}catch(e){}
  setTimeout(function(){try{BN.master.disconnect();}catch(e){}},2000);
  BN={};
}
function startBreathAudio(){
  stopAudio();
  var ac=getAC();
  var master=ac.createGain();
  master.gain.setValueAtTime(0,ac.currentTime);
  master.gain.linearRampToValueAtTime(0.65,ac.currentTime+2.0);
  master.connect(ac.destination);
  BN.master=master;
  // Drone: A minor chord 55/82.5/110/138.6 Hz
  var dg=ac.createGain();dg.gain.setValueAtTime(0.18,ac.currentTime);dg.connect(master);BN.droneGain=dg;
  [55,82.5,110,138.6].forEach(function(f,i){
    var o=ac.createOscillator(),og=ac.createGain(),flt=ac.createBiquadFilter();
    flt.type='lowpass';flt.frequency.value=400;flt.Q.value=0.5;
    o.type='sine';o.frequency.value=f;
    var lfo=ac.createOscillator(),lg=ac.createGain();
    lfo.frequency.value=0.15+i*0.05;lg.gain.value=f*0.003;
    lfo.connect(lg);lg.connect(o.frequency);lfo.start();
    og.gain.value=i===0?0.5:i===1?0.35:i===2?0.25:0.2;
    o.connect(flt);flt.connect(og);og.connect(dg);o.start();
  });
  // Binaural theta 6Hz: 100Hz left, 106Hz right
  var bg=ac.createGain();bg.gain.value=0.08;BN.binGain=bg;
  var mrg=ac.createChannelMerger(2);mrg.connect(bg);bg.connect(master);
  var oL=ac.createOscillator(),oR=ac.createOscillator(),gL=ac.createGain(),gR=ac.createGain();
  oL.frequency.value=100;oR.frequency.value=106;oL.type='sine';oR.type='sine';
  gL.gain.value=0.5;gR.gain.value=0.5;
  oL.connect(gL);oR.connect(gR);gL.connect(mrg,0,0);gR.connect(mrg,0,1);
  oL.start();oR.start();
  // Pad: lush detuned sawtooth A3-D4-E4-A4
  var pg=ac.createGain();pg.gain.value=0.0;BN.padGain=pg;pg.connect(master);
  [220,293.66,329.63,440].forEach(function(f){
    for(var d=-2;d<=2;d++){
      var o=ac.createOscillator(),g2=ac.createGain(),flt2=ac.createBiquadFilter();
      flt2.type='lowpass';flt2.frequency.value=800;flt2.Q.value=1.2;
      o.type='sawtooth';o.frequency.value=f*Math.pow(2,d*0.008);
      g2.gain.value=0.05;o.connect(flt2);flt2.connect(g2);g2.connect(pg);o.start();
    }
  });
  // Shimmer: high bell partials
  var sg=ac.createGain();sg.gain.value=0.0;BN.shimGain=sg;sg.connect(master);
  [1320,1760,2200,2640,3520].forEach(function(f,i){
    var o=ac.createOscillator(),g3=ac.createGain();
    o.type='sine';o.frequency.value=f;g3.gain.value=0.025/(i+1);
    o.connect(g3);g3.connect(sg);o.start();
  });
}
function updateBreathAudio(phase,progress){
  if(!AC||!BN.master)return;
  var now=AC.currentTime,pg=BN.padGain,sg=BN.shimGain,dg=BN.droneGain;
  if(!pg||!sg||!dg)return;
  if(phase==='inhale'){
    pg.gain.linearRampToValueAtTime(0.12+progress*0.22,now+0.08);
    sg.gain.linearRampToValueAtTime(progress*0.04,now+0.08);
    dg.gain.linearRampToValueAtTime(0.14+progress*0.08,now+0.08);
  } else if(phase==='hold'){
    pg.gain.linearRampToValueAtTime(0.34,now+0.1);
    sg.gain.linearRampToValueAtTime(0.09,now+0.1);
    dg.gain.linearRampToValueAtTime(0.22,now+0.1);
    if(Math.random()<0.04)ringBell();
  } else {
    var inv=1-progress;
    pg.gain.linearRampToValueAtTime(0.34*inv+0.04,now+0.12);
    sg.gain.linearRampToValueAtTime(0.18*(1-progress*progress),now+0.12);
    dg.gain.linearRampToValueAtTime(0.18*inv+0.10,now+0.12);
  }
}
function ringBell(){
  if(!AC||!BN.master)return;
  var ac=AC,now=ac.currentTime;
  var freqs=[1047,1319,1568,2093,2637];
  var f=freqs[Math.floor(Math.random()*freqs.length)];
  var o=ac.createOscillator(),g=ac.createGain(),flt=ac.createBiquadFilter();
  flt.type='bandpass';flt.frequency.value=f;flt.Q.value=8;
  o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.07,now+0.01);g.gain.exponentialRampToValueAtTime(0.001,now+1.8);
  o.connect(flt);flt.connect(g);g.connect(BN.master);o.start(now);o.stop(now+2);
}

// ---- DEMO ENGINE ----
function startDemo(){
  q('#modal').style.display='none';
  S.connected=true;
  q('#dot').classList.remove('off');
  q('#connBtn').textContent='Disconnect';
  q('#connBtn').className='cb';
  q('#battLabel').textContent='Demo Mode - 78% batt';
  q('#bttf').style.width='78%';
  q('#dbg').textContent='DEMO';
  demoTimer=setInterval(function(){
    S.t+=0.025;
    var tv=S.t;
    var a=40+Math.sin(tv*.08)*18+Math.sin(tv*.2)*8;
    var th=15+Math.sin(tv*.06)*8;
    var be=20+Math.cos(tv*.12)*10;
    var de=18+Math.sin(tv*.04)*5;
    var ga=7+Math.cos(tv*.15)*3;
    var tot=a+th+be+de+ga;
    S.bands={alpha:a/tot*100,theta:th/tot*100,beta:be/tot*100,delta:de/tot*100,gamma:ga/tot*100};
    S.emo={calm:Math.min(100,a/tot*140+th/tot*50),focus:Math.min(100,be/tot*160+ga/tot*80),stress:Math.min(100,be/tot*120+(1-a/tot)*40),meditation:Math.min(100,th/tot*150+a/tot*80)};
    var n=function(){return(Math.random()-.5)*6;};
    var av=Math.sin(2*Math.PI*10*tv)*28+Math.sin(2*Math.PI*10.5*tv)*12;
    var thv=Math.sin(2*Math.PI*6*tv)*14;
    var bev=Math.sin(2*Math.PI*20*tv)*8;
    [av+thv+n(),av*.9+bev+n(),av*1.1+thv*1.3+n(),av+thv*1.1+n()].forEach(function(v,i){
      S.eeg.ch[i].push(v);if(S.eeg.ch[i].length>BUF)S.eeg.ch[i].shift();
    });
    updateUI();
  },40);
}
function stopDemo(){
  clearInterval(demoTimer);demoTimer=null;S.connected=false;
  q('#dot').classList.add('off');
  q('#connBtn').textContent='Connect BrainBit';
  q('#connBtn').className='cb off';
  q('#battLabel').textContent='No device';
  q('#bttf').style.width='0%';
  q('#dbg').textContent='OFFLINE';
}
async function scanBT(){
  q('#modal').style.display='none';
  q('#connBtn').textContent='Scanning...';
  try{
    var dev=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'BrainBit'},{namePrefix:'Brainbit'}],
      optionalServices:['battery_service']
    });
    dev.addEventListener('gattserverdisconnected',stopDemo);
    startDemo();
    q('#battLabel').textContent=(dev.name||'BrainBit')+' - 78% batt';
    q('#dbg').textContent='LIVE';
  }catch(e){
    q('#connBtn').textContent='Connect BrainBit';
    q('#connBtn').className='cb off';
    q('#modal').style.display='flex';
  }
}

// ---- CANVAS ----
function drawEEG(id,bufs,h){
  var c=q('#'+id);if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=h;
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#060d18';ctx.fillRect(0,0,w,h);
  var tH=h/4;
  bufs.forEach(function(buf,ci){
    if(buf.length<2)return;
    var yB=ci*tH+tH/2,sc=tH/2/60;
    ctx.shadowColor=CHC[ci];ctx.shadowBlur=5;
    ctx.strokeStyle=CHC[ci];ctx.lineWidth=1.5;ctx.globalAlpha=.9;ctx.beginPath();
    buf.forEach(function(v,i){var x=i/buf.length*w,y=yB-v*sc;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0;
  });
}
function drawRaw(ci){
  var c=q('#rawC'+ci);if(!c)return;
  c.width=c.parentElement.offsetWidth||200;c.height=80;
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,80);
  var buf=S.eeg.ch[ci];if(buf.length<2)return;
  ctx.shadowColor=CHC[ci];ctx.shadowBlur=6;
  ctx.strokeStyle=CHC[ci];ctx.lineWidth=1.5;ctx.beginPath();
  buf.forEach(function(v,i){var x=i/buf.length*w,y=40-v*(40/60);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();ctx.shadowBlur=0;
}
function drawSpectro(){
  var c=q('#spectroC');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=120;
  S.specHist.push({delta:S.bands.delta,theta:S.bands.theta,alpha:S.bands.alpha,beta:S.bands.beta,gamma:S.bands.gamma});
  if(S.specHist.length>130)S.specHist.shift();
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,120);
  var bw=w/S.specHist.length;
  S.specHist.forEach(function(b,i){
    var x=i*bw,y=120;
    [['delta','#ff3d9a'],['theta','#b060ff'],['alpha','#00e5ff'],['beta','#5b8fff'],['gamma','#ffc820']].forEach(function(kc){
      var bh=b[kc[0]]/100*120*.92;
      ctx.fillStyle=kc[1]+h2((b[kc[0]]/60+.1)*220);
      ctx.fillRect(x,y-bh,bw+1,bh);y-=bh;
    });
  });
}
function drawHeatmap(){
  var c=q('#hmC');if(!c)return;
  c.width=200;c.height=220;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,200,220);
  ctx.strokeStyle='rgba(0,229,255,0.14)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(100,110,76,97,0,0,Math.PI*2);ctx.stroke();
  var pts=[{x:44,y:106,ci:0},{x:156,y:106,ci:1},{x:76,y:176,ci:2},{x:124,y:176,ci:3}];
  pts.forEach(function(p){
    var val=S.bands.alpha/100;
    var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,50+val*30);
    g.addColorStop(0,CHC[p.ci]+h2(val*170));g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,200,220);
    ctx.fillStyle=CHC[p.ci];ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a7a9a';ctx.font='bold 8px monospace';ctx.textAlign='center';
    ctx.fillText(CH[p.ci],p.x,p.y-9);
  });
  ctx.textAlign='left';
}
function drawGame(){
  var c=q('#gameC');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=220;
  var ctx=c.getContext('2d'),w=c.width;
  var m=S.game.mode==='calm'?S.emo.calm/100:S.game.mode==='focus'?S.emo.focus/100:S.bands.alpha/100;
  var col=S.game.mode==='calm'?'#00e5ff':S.game.mode==='focus'?'#5b8fff':'#b060ff';
  S.game.t+=0.04;var gt=S.game.t;
  if(S.game.id==='orb'){
    ctx.fillStyle='#02040a';ctx.fillRect(0,0,w,220);
    var g=ctx.createRadialGradient(w/2,110,0,w/2,110,Math.max(w,220)*.7);
    g.addColorStop(0,col+h2(m*55+10));g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,220);
    S.particles.forEach(function(p){
      p.x+=p.vx*(1+m*3);p.y+=p.vy*(1+m*3);
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      ctx.fillStyle=col+h2(p.op*m*200);
      ctx.beginPath();ctx.arc(p.x*w,p.y*220,p.sz*(1+m),0,Math.PI*2);ctx.fill();
    });
    var R=45+m*80;
    var og=ctx.createRadialGradient(w/2,110,0,w/2,110,R);
    og.addColorStop(0,col+'bb');og.addColorStop(.6,col+'33');og.addColorStop(1,'transparent');
    ctx.fillStyle=og;ctx.beginPath();ctx.arc(w/2,110,R,0,Math.PI*2);ctx.fill();
    for(var i=1;i<=3;i++){ctx.strokeStyle=col+h2(20*m/i);ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(w/2,110,R+i*18+m*8,0,Math.PI*2);ctx.stroke();}
  } else if(S.game.id==='aurora'){
    ctx.fillStyle='rgba(2,4,10,0.08)';ctx.fillRect(0,0,w,220);
    ['#00e5ff','#b060ff','#ff3d9a'].forEach(function(c2,i){
      var yB=220*(0.25+i*0.2)+Math.sin(gt*.5+i)*22*m;
      ctx.beginPath();
      for(var x=0;x<=w;x+=4){var y=yB+Math.sin(x*.02+gt+i)*20*m+Math.cos(x*.015+gt*.7)*12*m;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.shadowColor=c2;ctx.shadowBlur=15*m;ctx.strokeStyle=c2+h2(m*190+25);ctx.lineWidth=2+m*3;ctx.stroke();ctx.shadowBlur=0;
    });
  } else if(S.game.id==='gravity'){
    ctx.fillStyle='rgba(2,4,10,0.14)';ctx.fillRect(0,0,w,220);
    var cx=w/2,cy=110;
    var gg=ctx.createRadialGradient(cx,cy,0,cx,cy,65);gg.addColorStop(0,'#00ff9d50');gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cx,cy,65,0,Math.PI*2);ctx.fill();
    for(var j=0;j<5;j++){var a=gt*(.5+m*.8)+j*(Math.PI*2/5);var r=45+j*14+(1-m)*28;ctx.fillStyle='#00ff9d'+h2(90+m*120);ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,4+m*3,0,Math.PI*2);ctx.fill();}
  } else {
    ctx.fillStyle='rgba(2,4,10,0.18)';ctx.fillRect(0,0,w,220);
    var px=w/2,py=110,num=Math.floor(m*5)+2;
    for(var k=0;k<num;k++){var phase=(gt*.5+k/num)%1;var rad=phase*Math.min(w,220)*.48;var al=(1-phase)*m;ctx.strokeStyle='#ff3d9a'+h2(al*190);ctx.lineWidth=2*(1-phase);ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);ctx.stroke();}
  }
  if(S.game.startTime){
    var el=Math.floor((Date.now()-S.game.startTime)/1000);
    S.game.score=Math.round(m*el*10);
    var gs=q('#gScore');if(gs)gs.textContent=S.game.score;
    var gt2=q('#gTime');if(gt2)gt2.textContent=el+'s';
    var gb=q('#gBrain');if(gb)gb.textContent=Math.round(m*100)+'%';
  }
}
function drawBreath(){
  var c=q('#breathC');if(!c)return;
  c.width=180;c.height=180;
  var ctx=c.getContext('2d');
  ctx.clearRect(0,0,180,180);
  var phase=S.breath.phase,progress=S.breath.progress;
  var scale=phase==='inhale'?progress:phase==='hold'?1:1-progress;
  var R=38+scale*(78-38);
  var col=phase==='inhale'?'#5b8fff':phase==='hold'?'#00ff9d':'#00e5ff';
  for(var i=3;i>=1;i--){ctx.strokeStyle=col+h2(12/i*255);ctx.lineWidth=1;ctx.beginPath();ctx.arc(90,90,R+i*13*(1-scale*.3),0,Math.PI*2);ctx.stroke();}
  var g=ctx.createRadialGradient(90,90,0,90,90,R);
  g.addColorStop(0,col+'55');g.addColorStop(.6,col+'18');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(90,90,R,0,Math.PI*2);ctx.fill();
  ctx.shadowColor=col;ctx.shadowBlur=15;ctx.strokeStyle=col+'99';ctx.lineWidth=2;ctx.beginPath();ctx.arc(90,90,R,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=col;ctx.font='bold 11px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(phase.toUpperCase(),90,94);ctx.textAlign='left';
  var pl=q('#bPhLbl');if(pl)pl.textContent=phase.charAt(0).toUpperCase()+phase.slice(1);
}
function drawTrend(){
  var c=q('#trendC');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=150;
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#060d18';ctx.fillRect(0,0,w,150);
  ctx.strokeStyle='rgba(0,229,255,0.04)';ctx.lineWidth=1;
  for(var i=0;i<=3;i++){var y=i/3*150;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  var data=S.history.slice().reverse();
  [['alpha','#00e5ff'],['theta','#b060ff'],['beta','#5b8fff']].forEach(function(kc){
    ctx.shadowColor=kc[1];ctx.shadowBlur=7;ctx.strokeStyle=kc[1];ctx.lineWidth=2;ctx.beginPath();
    data.forEach(function(d,i){var x=i/(data.length-1)*w,y=150-d[kc[0]]/45*150;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.shadowBlur=0;
    data.forEach(function(d,i){var x=i/(data.length-1)*w,y=150-d[kc[0]]/45*150;ctx.fillStyle=kc[1];ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();});
  });
}
function drawSleep(){
  var c=q('#sleepC');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=100;
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,100);
  var st=S.sleepStages,bw=w/st.length;
  st.forEach(function(s,i){var y=(3-s)*25,col=SLEEPC[s];ctx.fillStyle=col+'35';ctx.fillRect(i*bw,y,bw,25);ctx.fillStyle=col+'80';ctx.fillRect(i*bw,y,bw,2);});
  ['Awake','Light','Deep','REM'].forEach(function(l,i){ctx.fillStyle=SLEEPC[3-i]+'bb';ctx.font='8px monospace';ctx.fillText(l,3,(3-i)*25+10);});
}
function drawCorrTL(){
  var c=q('#corrTL');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=120;
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#060d18';ctx.fillRect(0,0,w,120);
  var pw=w-40,ph=100,bw=pw/S.corrData.length;
  S.corrData.forEach(function(dd,i){
    var x=20+i*bw+bw*.1,bh=dd.score/100*ph;
    var col=dd.had?'#00e5ff':'#2a3a50';
    ctx.fillStyle=col+(dd.had?'30':'20');ctx.fillRect(x,10+ph-bh,bw*.8,bh);
    ctx.fillStyle=col+(dd.had?'90':'40');ctx.fillRect(x,10+ph-bh,bw*.8,2);
  });
}
function drawCorrSC(){
  var c=q('#corrSC');if(!c)return;
  c.width=c.parentElement.offsetWidth||300;c.height=150;
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,150);
  var pts=S.corrData.filter(function(d){return d.al&&d.score;});
  if(pts.length<2)return;
  var xv=pts.map(function(p){return p.al;}),yv=pts.map(function(p){return p.score;});
  var xMin=Math.min.apply(null,xv)*.9,xMax=Math.max.apply(null,xv)*1.05;
  var yMin=Math.min.apply(null,yv)*.9,yMax=Math.max.apply(null,yv)*1.05;
  var toX=function(v){return 32+(v-xMin)/(xMax-xMin)*(w-44);};
  var toY=function(v){return 12+126-(v-yMin)/(yMax-yMin)*126;};
  pts.forEach(function(p){ctx.fillStyle='#00e5ffaa';ctx.beginPath();ctx.arc(toX(p.al),toY(p.score),5,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#5a7a9a';ctx.font='9px monospace';ctx.fillText('Alpha %',32,146);
}

window.toggleBreath=function(){
  if(S.breath.active){
    clearInterval(S.breath.tmr);S.breath.active=false;
    stopAudio();
    var bb=q('#breathBtn');if(bb){bb.textContent='Start Guide + Sound';bb.className='btn bp1';}
  } else {
    if(!S.connected)startDemo();
    S.breath.active=true;
    startBreathAudio();
    var bp=BPS[S.breath.bp],total=(bp.inhale+bp.hold+bp.exhale)*1000;
    S.breath.tmr=setInterval(function(){
      var ms=Date.now()%total;
      if(ms<bp.inhale*1000){S.breath.phase='inhale';S.breath.progress=ms/(bp.inhale*1000);}
      else if(ms<(bp.inhale+bp.hold)*1000){S.breath.phase='hold';S.breath.progress=(ms-bp.inhale*1000)/((bp.hold||.1)*1000);}
      else{S.breath.phase='exhale';S.breath.progress=(ms-(bp.inhale+bp.hold)*1000)/(bp.exhale*1000);}
      updateBreathAudio(S.breath.phase,S.breath.progress);
      drawBreath();
    },50);
    var bb2=q('#breathBtn');if(bb2){bb2.textContent='Stop Guide';bb2.className='btn bd3';}
  }
};

function vGame(){
  var gcards=GAMES.map(function(g){return '<div class="gc'+(g.id==='orb'?' on':'')+'" id="gc-'+g.id+'" onclick="selGame(\''+g.id+'\')"><div class="gn" style="color:'+g.col+'">'+g.nm+'</div><div class="gds">'+g.ds+'</div></div>';}).join('');

    '<div class="pn"><div class="ph"><span class="pt">Neurofeedback Game</span></div><div class="pbd">'+

    '</div>'+
    '<div class="go" id="gOverlay">'+
    '<div class="gt" id="gOvlTit">Neural Orb</div>'+
    '<div class="ms">'+mbtns+'</div>'+
    '<button class="btn bp1" onclick="startGame()">Begin Training</button>'+
    '</div></div></div></div>'+
    '<div class="g3"><div class="sc"><div class="sl">Best</div><div class="sv" style="color:var(--gd)">--</div></div><div class="sc"><div class="sl">Sessions</div><div class="sv" style="color:var(--bt)">0</div></div><div class="sc"><div class="sl">Avg Calm</div><div class="sv" style="color:var(--pu)">--</div></div></div></div>';

    '</div></div>'+
    '<div class="g4">'+[['Total','7h 12m','#00e5ff'],['Deep','1h 08m','#b060ff'],['REM','1h 34m','#ff3d9a'],['Score','78','#ffc820']].map(function(kv){return '<div class="sc" style="border-color:'+kv[2]+'18"><div class="sl">'+kv[0]+'</div><div class="sv" style="color:'+kv[2]+'">'+kv[1]+'</div></div>';}).join('')+'</div></div>';

    '<div class="pn"><div class="ph"><span class="pt">30-Day Timeline</span></div><div class="pbd"><canvas id="corrTL" style="width:100%;height:120px"></canvas></div></div>'+
    '<div class="g2"><div class="pn"><div class="ph"><span class="pt">Alpha vs Sleep Score</span></div><div class="pbd"><canvas id="corrSC" style="width:100%;height:150px"></canvas></div></div>'+

    ACHS.map(function(a){return '<div class="ac'+(a.ul?' ul':' lk')+'"><div class="an" style="color:'+(a.ul?'var(--gd)':'var(--t3)')+'">'+a.nm+'</div><div class="ad">'+a.ds+'</div><div class="axp">+'+a.xp+' XP</div></div>';}).join('')+

// ---- INIT ----
function init(){
  buildSidebar();
  buildMain();
  renderJournal();
  // Wire up modal buttons
  var scanBtn=q('#scanBtn');if(scanBtn)scanBtn.addEventListener('click',scanBT);
  var demoBtn=q('#demoBtn');if(demoBtn)demoBtn.addEventListener('click',startDemo);
  setTimeout(function(){drawSleep();drawTrend();},200);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}
</script></body></html>
