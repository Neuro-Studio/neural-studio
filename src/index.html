<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Neural Studio</title><style>
:root{--bg:#02040a;--bg2:#060d18;--bg3:#0a1525;--bd:rgba(0,200,255,0.12);--cy:#00e5ff;--cy2:rgba(0,229,255,0.1);--pu:#b060ff;--pk:#ff3d9a;--gd:#ffc820;--gr:#00ff9d;--bt:#5b8fff;--t1:#c8e8ff;--t2:#5a7a9a;--t3:#2a3a50}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}
.tb{height:38px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px 0 80px;gap:10px;flex-shrink:0;-webkit-app-region:drag}
.dot{width:8px;height:8px;border-radius:50%;background:var(--cy);box-shadow:0 0 10px var(--cy);animation:pk 2s infinite;-webkit-app-region:no-drag}
.dot.off{background:var(--t3);box-shadow:none;animation:none}
.tit{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--t2);text-transform:uppercase}
.tit span{color:var(--cy)}
.tr{margin-left:auto;display:flex;align-items:center;gap:10px;-webkit-app-region:no-drag}
.dbg{font-family:monospace;font-size:9px;color:var(--t3);background:var(--bg3);padding:2px 10px;border-radius:4px;border:1px solid var(--bd)}
.xpw{width:110px}.xpl{display:flex;justify-content:space-between;margin-bottom:2px}.xplv{font-size:9px;font-weight:700;color:var(--gd)}.xppt{font-family:monospace;font-size:9px;color:var(--t3)}
.xpt{height:3px;background:var(--bg);border-radius:2px;overflow:hidden}.xpf{height:100%;background:var(--gd);border-radius:2px}
.lay{display:flex;flex:1;overflow:hidden}
.sb{width:185px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:10px 0;overflow-y:auto;flex-shrink:0}
.sb::-webkit-scrollbar{width:0}
.ns{font-size:8px;font-weight:700;letter-spacing:.2em;color:var(--t3);padding:12px 14px 4px;text-transform:uppercase}
.ni{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--t2);border-left:2px solid transparent;transition:all .12s}
.ni:hover{color:var(--t1);background:rgba(0,229,255,.04)}.ni.on{color:var(--cy);background:var(--cy2);border-left-color:var(--cy)}
.sf{margin-top:auto;padding:10px}
.cb{text-align:center;padding:8px;border-radius:7px;border:1px solid rgba(0,229,255,.2);background:var(--cy2);color:var(--cy);font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;margin-bottom:6px}
.cb.off{border-color:var(--bd);background:transparent;color:var(--t2)}
.bl{text-align:center;font-family:monospace;font-size:9px;color:var(--t3);margin-bottom:4px}
.btt{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}.bttf{height:100%;background:var(--cy);border-radius:2px;width:0%}
.mn{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px}
.mn::-webkit-scrollbar{width:3px}.mn::-webkit-scrollbar-thumb{background:rgba(0,229,255,.1);border-radius:2px}
.vw{display:none;flex-direction:column;gap:11px}.vw.on{display:flex}
.pn{background:var(--bg2);border-radius:10px;border:1px solid var(--bd);overflow:hidden}
.ph{padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.pt{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--t2)}
.pbg{font-family:monospace;font-size:9px;padding:2px 8px;border-radius:4px;background:var(--cy2);color:var(--cy);border:1px solid rgba(0,229,255,.18)}
.pbd{padding:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.sc{background:var(--bg2);border-radius:9px;padding:13px;text-align:center;border:1px solid var(--bd)}
.sl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.sv{font-family:monospace;font-size:22px;font-weight:800}.ss{font-size:9px;color:var(--t3);margin-top:3px}
.mt{background:var(--bg3);border-radius:7px;padding:11px;border:1px solid var(--bd)}
.mh{display:flex;justify-content:space-between;margin-bottom:8px}
.ml{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}
.mv{font-family:monospace;font-size:16px}
.tk{height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.fi{height:100%;border-radius:2px;transition:width .5s}
.bc{background:var(--bg3);border-radius:7px;padding:10px 8px;border:1px solid rgba(0,200,255,.05);flex:1}
.bn{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.bk{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:6px;overflow:hidden}
.bfi{height:100%;border-radius:2px;transition:width .5s}
.bpc{font-family:monospace;font-size:13px}.bz{font-size:8px;color:var(--t3);margin-top:2px}
.rc{background:var(--bg2);border-radius:9px;padding:12px;text-align:center;border:1px solid var(--bd)}
.rd{width:8px;height:8px;border-radius:50%;margin:0 auto 7px}
.rn{font-family:monospace;font-size:9px;color:var(--t2);margin-bottom:4px}
.rv{font-family:monospace;font-size:16px;font-weight:700}.rq{font-size:8px;color:var(--t3);margin-top:2px}
canvas{display:block;border-radius:5px}
.btn{padding:8px 18px;border-radius:7px;font-family:-apple-system,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s}
.bp1{background:rgba(0,229,255,.75);color:var(--bg)}.bs2{background:transparent;color:var(--t2);border:1px solid var(--bd)!important}
.bd3{background:transparent;color:var(--pk);border:1px solid rgba(255,61,154,.3)!important}
.tmr{font-family:monospace;font-size:38px;font-weight:300;color:var(--cy);letter-spacing:.05em}
.gw{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.ghd{position:absolute;top:9px;left:9px;right:9px;display:flex;justify-content:space-between;z-index:5}
.hi{background:rgba(2,4,10,.88);border:1px solid var(--bd);border-radius:5px;padding:4px 10px;font-family:monospace;font-size:9px;color:var(--t2)}
.hv{color:var(--cy)}
.go{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(2,4,10,.9);z-index:10;gap:10px}
.gt{font-size:16px;font-weight:700;color:var(--cy)}
.ms{display:flex;gap:6px}
.mbt{padding:6px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-size:10px;font-weight:600;cursor:pointer}
.mbt.on{border-color:rgba(0,229,255,.35);background:var(--cy2);color:var(--cy)}
.gc{background:var(--bg3);border-radius:8px;padding:11px;border:1px solid var(--bd);cursor:pointer;text-align:center;transition:all .15s}
.gc.on{border-color:rgba(0,229,255,.3);background:var(--cy2)}
.gn{font-size:10px;font-weight:700;color:var(--t1);margin-bottom:3px}.gds{font-size:9px;color:var(--t3);line-height:1.5}
.ac{background:var(--bg3);border-radius:9px;padding:13px;text-align:center;border:1px solid var(--bd)}
.ac.ul{border-color:rgba(255,200,32,.22)}.ac.lk{opacity:.4;filter:grayscale(.8)}
.an{font-size:10px;font-weight:700;margin-bottom:4px}.ad{font-size:9px;color:var(--t3);line-height:1.5;margin-bottom:6px}
.axp{font-family:monospace;font-size:10px;color:var(--gd)}
.je{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--bd);margin-bottom:8px}
.jmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.jdate{font-family:monospace;font-size:10px;color:var(--t2)}
.jfield{font-size:10px;color:var(--t2);margin-bottom:3px;line-height:1.6}
.jnote{font-size:10px;color:var(--t3);font-style:italic;margin-top:5px}
.bpb{padding:7px 13px;border-radius:7px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-size:10px;font-weight:600;cursor:pointer}
.bpb.on{border-color:rgba(0,229,255,.35);background:var(--cy2);color:var(--cy)}
.pcard{background:var(--bg3);border-radius:9px;padding:14px;border:1px solid rgba(0,229,255,.08);cursor:pointer;position:relative;overflow:hidden}
.pname{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:5px}
.pdesc{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.icard{background:var(--bg2);border-radius:10px;padding:15px;border:1px solid rgba(0,200,255,.07)}
table{width:100%;border-collapse:collapse;font-family:monospace;font-size:10px}
th{text-align:left;padding:6px 10px;color:var(--t3);font-size:8px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--bd)}
td{padding:7px 10px;color:var(--t2);border-bottom:1px solid rgba(0,200,255,.04)}
textarea{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:9px;color:var(--t1);font-family:monospace;font-size:10px;resize:none;outline:none;line-height:1.6;width:100%}
.mdl{position:fixed;inset:0;background:rgba(2,4,10,.92);z-index:1000;display:flex;align-items:center;justify-content:center}
.mdb{background:var(--bg2);border:1px solid rgba(0,229,255,.15);border-radius:12px;padding:28px;max-width:400px;width:90%;text-align:center}
.mdt{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:8px}
.mdd{font-size:11px;color:var(--t2);line-height:1.7;margin-bottom:20px}
.mb1{width:100%;padding:11px;border-radius:8px;margin-bottom:8px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;background:rgba(0,229,255,.75);color:var(--bg)}
.mb2{width:100%;padding:11px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:transparent;color:var(--t2);border:1px solid rgba(0,229,255,.12)}
.wg{display:flex;flex-direction:column;gap:3px}.wr{display:flex;gap:3px}
.dc{width:22px;height:22px;border-radius:3px}
.sleg{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.slitem{display:flex;align-items:center;gap:5px;font-family:monospace;font-size:9px;color:var(--t2)}
.sldot{width:7px;height:7px;border-radius:2px}
.brow{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t1);flex-shrink:0;border:1px solid var(--bd)}
.btl{font-size:10px;font-weight:600;color:var(--t1)}.bds{font-size:9px;color:var(--t3);margin-top:2px}
.bpl{font-family:monospace;font-size:11px;color:var(--cy);letter-spacing:.1em;text-transform:uppercase;margin-top:6px;text-align:center}
@keyframes pk{0%,100%{opacity:1}50%{opacity:.3}}
</style></head><body>
<div id="app">
  <div class="tb">
    <div class="dot off" id="dot"></div>
    <span class="tit">Neural Studio <span>v3</span></span>
    <div class="tr"><span class="dbg" id="dbg">OFFLINE</span></div>
  </div>
  <div class="lay">
    <div class="sb" id="sb"></div>
    <div class="mn" id="main"></div>
  </div>
</div>
<div class="mdl" id="modal">
  <div class="mdb">
    <div style="font-size:26px;margin-bottom:12px">&#9678;</div>
    <div class="mdt">Connect BrainBit</div>
    <div class="mdd">Power on your BrainBit headband and make sure Bluetooth is enabled, then click Scan.<br><br>No headband yet? Use Demo Mode to explore the app.</div>
    <button class="mb1" onclick="scanBT()">Scan for BrainBit</button>
    <button class="mb2" onclick="startDemo()">Demo Mode</button>
  </div>
</div>
<script>
// Neural Studio v3 - Fresh Build
const CH=['T3','T4','O1','O2'],CHC=['#00e5ff','#5b8fff','#b060ff','#ff3d9a'];
const BANDS=['delta','theta','alpha','beta','gamma'],BC=['#ff3d9a','#b060ff','#00e5ff','#5b8fff','#ffc820'];
const BHZ=['0.5-4','4-8','8-13','13-30','30-50'];
const SLEEPC=['#ffc820','#00e5ff','#b060ff','#ff3d9a'];
const BUF=250;
const VIEWS=[
  {id:'dashboard',ic:'[D]',lb:'Overview',sc:'Monitor'},
  {id:'raw',ic:'[R]',lb:'Raw EEG',sc:'Monitor'},
  {id:'spectrogram',ic:'[S]',lb:'Spectrogram',sc:'Monitor'},
  {id:'heatmap',ic:'[H]',lb:'Brain Map',sc:'Monitor'},
  {id:'meditation',ic:'[M]',lb:'Meditation',sc:'Training'},
  {id:'breathing',ic:'[B]',lb:'Breathing',sc:'Training'},
  {id:'protocols',ic:'[P]',lb:'Protocols',sc:'Training'},
  {id:'game',ic:'[G]',lb:'NF Game',sc:'Training'},
  {id:'sleep',ic:'[Z]',lb:'Sleep',sc:'Tracking'},
  {id:'journal',ic:'[J]',lb:'Journal',sc:'Tracking'},
  {id:'history',ic:'[L]',lb:'Sessions',sc:'Analysis'},
  {id:'reports',ic:'[T]',lb:'Reports',sc:'Analysis'},
  {id:'correlation',ic:'[X]',lb:'Sleep x Med',sc:'Analysis'},
  {id:'achievements',ic:'[A]',lb:'Achievements',sc:'Profile'},
];
const GAMES=[
  {id:'orb',nm:'Neural Orb',ds:'Orb expands with calm',col:'#00e5ff'},
  {id:'aurora',nm:'Aurora Mind',ds:'Paint sky with alpha waves',col:'#b060ff'},
  {id:'gravity',nm:'Gravity Well',ds:'Control orbit with focus',col:'#00ff9d'},
  {id:'pulse',nm:'Pulse Field',ds:'Send neural wave rings',col:'#ff3d9a'},
];
const PROTOS=[
  {id:'calm',nm:'Calm & Relaxation',col:'#00e5ff',ds:'Increase alpha for deep rest.',lvls:['Beginner','Intermediate','Expert']},
  {id:'focus',nm:'Focus Training',col:'#5b8fff',ds:'Train beta/SMR for attention.',lvls:['Beginner','Intermediate','Expert']},
  {id:'sleep2',nm:'Sleep Prep',col:'#b060ff',ds:'Build theta/delta for sleep.',lvls:['Beginner','Intermediate','Expert']},
  {id:'anxiety',nm:'Anxiety Relief',col:'#ffc820',ds:'Lower high-beta, boost alpha.',lvls:['Beginner','Intermediate','Expert']},
];
const ACHS=[
  {nm:'First Contact',ds:'Complete first session',xp:50,ul:true},
  {nm:'Calm Master',ds:'Reach 80% calm for 30s',xp:100,ul:true},
  {nm:'Alpha Surge',ds:'Hit 60% alpha power',xp:150,ul:false},
  {nm:'On Fire',ds:'3-day session streak',xp:200,ul:false},
  {nm:'Deep Diver',ds:'Meditation depth 75%+',xp:250,ul:false},
  {nm:'Centurion',ds:'Score 100 in NF Game',xp:300,ul:false},
  {nm:'Dedicated',ds:'10 sessions completed',xp:500,ul:false},
  {nm:'Chronicler',ds:'7 journal entries',xp:200,ul:false},
];
const BPS=[
  {inhale:4,hold:4,exhale:6,nm:'4-4-6 Box'},
  {inhale:4,hold:7,exhale:8,nm:'4-7-8 Sleep'},
  {inhale:5,hold:0,exhale:5,nm:'5-5 Calm'},
  {inhale:6,hold:2,exhale:8,nm:'6-2-8 Deep'},
];

var S={
  view:'dashboard',connected:false,t:0,
  bands:{delta:18,theta:15,alpha:40,beta:20,gamma:7},
  emo:{calm:62,focus:38,stress:28,meditation:55},
  res:[24,31,19,28],
  eeg:{ch:[[],[],[],[]]},
  session:{active:false,elapsed:0,tmr:null,hist:[]},
  breath:{active:false,phase:'inhale',progress:0,bp:0,tmr:null},
  game:{active:false,id:'orb',mode:'calm',score:0,elapsed:0,t:0},
  selGame:'orb',selMode:'calm',
  xp:750,level:2,
  entries:[
    {date:'Apr 20',mood:4,before:'Anxious, racing thoughts',after:'Calm and grounded',note:'Best session yet.'},
    {date:'Apr 18',mood:3,before:'Tired but wired',after:'Slightly calmer',note:'Hard to focus at start.'},
  ],
  history:[
    {date:'Apr 20',dur:'18m',alpha:38,theta:16,beta:22,calm:58,focus:35,stress:32},
    {date:'Apr 18',dur:'22m',alpha:34,theta:14,beta:25,calm:52,focus:40,stress:38},
    {date:'Apr 16',dur:'15m',alpha:30,theta:13,beta:27,calm:48,focus:38,stress:42},
    {date:'Apr 14',dur:'20m',alpha:28,theta:12,beta:29,calm:45,focus:42,stress:45},
  ],
  sleepStages:(function(){var s=[];for(var i=0;i<80;i++){var p=s[i-1]!=null?s[i-1]:1;s.push(Math.max(0,Math.min(3,p+(Math.random()>.72?(Math.random()>.5?1:-1):0))));}return s;})(),
  particles:(function(){var p=[];for(var i=0;i<55;i++)p.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.002,vy:(Math.random()-.5)*.002,sz:Math.random()*3+1,op:Math.random()*.6+.2});return p;})(),
  specHist:[],corrData:(function(){var d=[];for(var i=0;i<30;i++){var had=Math.random()>.3;d.push({day:i+1,had:had,al:had?+(28+Math.random()*20).toFixed(1):null,score:Math.round(had?55+Math.random()*35:35+Math.random()*25)});}return d;})(),
};

var demoTimer=null;
var q=function(s){return document.querySelector(s);};
var qa=function(s){return document.querySelectorAll(s);};
function h2(n){return Math.round(Math.max(0,Math.min(255,n))).toString(16).padStart(2,'0');}

function startDemo(){
  q('#modal').style.display='none';
  S.connected=true;
  q('#dot').classList.remove('off');
  q('#connBtn').textContent='Disconnect';
  q('#connBtn').className='cb';
  q('#battLabel').textContent='Demo Mode - 78% batt';
  q('#bttf').style.width='78%';
  q('#dbg').textContent='DEMO';
  demoTimer=setInterval(function(){
    S.t+=0.025;
    var tv=S.t;
    var a=40+Math.sin(tv*.08)*18+Math.sin(tv*.2)*8;
    var th=15+Math.sin(tv*.06)*8;
    var be=20+Math.cos(tv*.12)*10;
    var de=18+Math.sin(tv*.04)*5;
    var ga=7+Math.cos(tv*.15)*3;
    var tot=a+th+be+de+ga;
    S.bands={alpha:a/tot*100,theta:th/tot*100,beta:be/tot*100,delta:de/tot*100,gamma:ga/tot*100};
    S.emo={calm:Math.min(100,a/tot*140+th/tot*50),focus:Math.min(100,be/tot*160+ga/tot*80),stress:Math.min(100,be/tot*120+(1-a/tot)*40),meditation:Math.min(100,th/tot*150+a/tot*80)};
    var n=function(){return (Math.random()-.5)*6;};
    var av=Math.sin(2*Math.PI*10*tv)*28+Math.sin(2*Math.PI*10.5*tv)*12;
    var thv=Math.sin(2*Math.PI*6*tv)*14;
    var bev=Math.sin(2*Math.PI*20*tv)*8;
    [av+thv+n(),av*.9+bev+n(),av*1.1+thv*1.3+n(),av+thv*1.1+n()].forEach(function(v,i){
      S.eeg.ch[i].push(v);
      if(S.eeg.ch[i].length>BUF)S.eeg.ch[i].shift();
    });
    updateUI();
  },40);
}

function stopDemo(){
  clearInterval(demoTimer);demoTimer=null;S.connected=false;
  q('#dot').classList.add('off');
  q('#connBtn').textContent='Connect BrainBit';
  q('#connBtn').className='cb off';
  q('#battLabel').textContent='No device';
  q('#bttf').style.width='0%';
  q('#dbg').textContent='OFFLINE';
}

async function scanBT(){
  q('#modal').style.display='none';
  q('#connBtn').textContent='Scanning...';
  try{
    var dev=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'BrainBit'},{namePrefix:'Brainbit'}],
      optionalServices:['battery_service']
    });
    dev.addEventListener('gattserverdisconnected',stopDemo);
    S.connected=true;
    startDemo();
    q('#battLabel').textContent=(dev.name||'BrainBit')+' - 78% batt';
    q('#dbg').textContent='LIVE';
  }catch(e){
    q('#connBtn').textContent='Connect BrainBit';
    q('#connBtn').className='cb off';
    q('#modal').style.display='flex';
  }
}

function setView(id){
  S.view=id;
  qa('.vw').forEach(function(v){v.classList.remove('on');});
  qa('.ni').forEach(function(n){n.classList.remove('on');});
  var v=q('#v-'+id);if(v)v.classList.add('on');
  var n=q('#ni-'+id);if(n)n.classList.add('on');
  if(id==='sleep')setTimeout(drawSleep,60);
  if(id==='reports')setTimeout(drawTrend,60);
  if(id==='correlation')setTimeout(function(){drawCorrTL();drawCorrSC();},60);
  if(id==='heatmap')setTimeout(drawHeatmap,60);
  if(id==='spectrogram')S.specHist=[];
}

function updateUI(){
  BANDS.forEach(function(b){
    var f=q('#bfill-'+b);if(f)f.style.width=S.bands[b]+'%';
    var p=q('#bpct-'+b);if(p)p.textContent=Math.round(S.bands[b])+'%';
  });
  var dom=Object.entries(S.bands).reduce(function(a,b){return b[1]>a[1]?b:a;})[0];
  var db=q('#domBadge');if(db)db.textContent=dom.toUpperCase();

  });

function drawEEG(id,bufs,h){
  var c=q('#'+id);if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=h;
  var ctx=c.getContext('2d'),w=c.width;
  ctx.fillStyle='#060d18';ctx.fillRect(0,0,w,h);
  var tH=h/4;
  bufs.forEach(function(buf,ci){
    if(buf.length<2)return;
    var yB=ci*tH+tH/2,sc=tH/2/60;
    ctx.shadowColor=CHC[ci];ctx.shadowBlur=5;
    ctx.strokeStyle=CHC[ci];ctx.lineWidth=1.5;ctx.globalAlpha=.9;ctx.beginPath();
    buf.forEach(function(v,i){var x=i/buf.length*w,y=yB-v*sc;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0;
  });
}

function drawRaw(ci){
  var c=q('#rawC'+ci);if(!c)return;
  c.width=c.parentElement.offsetWidth||200;c.height=80;
  var ctx=c.getContext('2d'),w=c.width,h=80;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,h);
  var buf=S.eeg.ch[ci];if(buf.length<2)return;
  ctx.shadowColor=CHC[ci];ctx.shadowBlur=6;
  ctx.strokeStyle=CHC[ci];ctx.lineWidth=1.5;ctx.beginPath();
  buf.forEach(function(v,i){var x=i/buf.length*w,y=h/2-v*(h/2/60);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();ctx.shadowBlur=0;
}

function drawSpectro(){
  var c=q('#spectroC');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=120;
  S.specHist.push({delta:S.bands.delta,theta:S.bands.theta,alpha:S.bands.alpha,beta:S.bands.beta,gamma:S.bands.gamma});
  if(S.specHist.length>130)S.specHist.shift();
  var ctx=c.getContext('2d'),w=c.width,h=120;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,h);
  var bw=w/S.specHist.length;
  S.specHist.forEach(function(b,i){
    var x=i*bw,y=h;
    [['delta','#ff3d9a'],['theta','#b060ff'],['alpha','#00e5ff'],['beta','#5b8fff'],['gamma','#ffc820']].forEach(function(kc){
      var bh=b[kc[0]]/100*h*.92;
      ctx.fillStyle=kc[1]+h2((b[kc[0]]/60+.1)*220);
      ctx.fillRect(x,y-bh,bw+1,bh);y-=bh;
    });
  });
}

function drawHeatmap(){
  var c=q('#hmC');if(!c)return;
  c.width=200;c.height=220;
  var ctx=c.getContext('2d'),w=200,h=220;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,229,255,0.14)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(w/2,h/2,w*.38,h*.44,0,0,Math.PI*2);ctx.stroke();
  var pts=[{x:w*.22,y:h*.48,ci:0},{x:w*.78,y:h*.48,ci:1},{x:w*.38,y:h*.80,ci:2},{x:w*.62,y:h*.80,ci:3}];
  pts.forEach(function(p){
    var val=S.bands.alpha/100;
    var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,50+val*30);
    g.addColorStop(0,CHC[p.ci]+h2(val*170));g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    ctx.fillStyle=CHC[p.ci];ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a7a9a';ctx.font='bold 8px monospace';ctx.textAlign='center';
    ctx.fillText(CH[p.ci],p.x,p.y-9);
  });
  ctx.textAlign='left';
}

function drawGame(){
  var c=q('#gameC');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=220;
  var ctx=c.getContext('2d'),w=c.width,h=220;
  var m=S.game.mode==='calm'?S.emo.calm/100:S.game.mode==='focus'?S.emo.focus/100:S.bands.alpha/100;
  var col=S.game.mode==='calm'?'#00e5ff':S.game.mode==='focus'?'#5b8fff':'#b060ff';
  S.game.t+=0.04;var gt=S.game.t;
  if(S.game.id==='orb'){
    ctx.fillStyle='#02040a';ctx.fillRect(0,0,w,h);
    var g=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.7);
    g.addColorStop(0,col+h2(m*55+10));g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    S.particles.forEach(function(p){
      p.x+=p.vx*(1+m*3);p.y+=p.vy*(1+m*3);
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      ctx.fillStyle=col+h2(p.op*m*200);
      ctx.beginPath();ctx.arc(p.x*w,p.y*h,p.sz*(1+m),0,Math.PI*2);ctx.fill();
    });
    var R=45+m*80;
    var og=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,R);
    og.addColorStop(0,col+'bb');og.addColorStop(.6,col+'33');og.addColorStop(1,'transparent');
    ctx.fillStyle=og;ctx.beginPath();ctx.arc(w/2,h/2,R,0,Math.PI*2);ctx.fill();
    for(var i=1;i<=3;i++){ctx.strokeStyle=col+h2(20*m/i);ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(w/2,h/2,R+i*18+m*8,0,Math.PI*2);ctx.stroke();}
  } else if(S.game.id==='aurora'){
    ctx.fillStyle='rgba(2,4,10,0.08)';ctx.fillRect(0,0,w,h);
    ['#00e5ff','#b060ff','#ff3d9a'].forEach(function(c2,i){
      var yB=h*(0.25+i*0.2)+Math.sin(gt*.5+i)*22*m;
      ctx.beginPath();
      for(var x=0;x<=w;x+=4){var y=yB+Math.sin(x*.02+gt+i)*20*m+Math.cos(x*.015+gt*.7)*12*m;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.shadowColor=c2;ctx.shadowBlur=15*m;ctx.strokeStyle=c2+h2(m*190+25);ctx.lineWidth=2+m*3;ctx.stroke();ctx.shadowBlur=0;
    });
  } else if(S.game.id==='gravity'){
    ctx.fillStyle='rgba(2,4,10,0.14)';ctx.fillRect(0,0,w,h);
    var cx=w/2,cy=h/2;
    var gg=ctx.createRadialGradient(cx,cy,0,cx,cy,65);gg.addColorStop(0,'#00ff9d50');gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cx,cy,65,0,Math.PI*2);ctx.fill();
    for(var j=0;j<5;j++){var a=gt*(.5+m*.8)+j*(Math.PI*2/5);var r=45+j*14+(1-m)*28;ctx.fillStyle='#00ff9d'+h2(90+m*120);ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,4+m*3,0,Math.PI*2);ctx.fill();}
  } else {
    ctx.fillStyle='rgba(2,4,10,0.18)';ctx.fillRect(0,0,w,h);
    var px=w/2,py=h/2,num=Math.floor(m*5)+2;
    for(var k=0;k<num;k++){var phase=(gt*.5+k/num)%1;var rad=phase*Math.min(w,h)*.48;var al=(1-phase)*m;ctx.strokeStyle='#ff3d9a'+h2(al*190);ctx.lineWidth=2*(1-phase);ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);ctx.stroke();}
    for(var l=0;l<8;l++){var ang=l*(Math.PI*2/8)+gt*.3;var rr=60+m*40;ctx.fillStyle='#ff3d9a'+h2(m*160);ctx.beginPath();ctx.arc(px+Math.cos(ang)*rr,py+Math.sin(ang)*rr,3+m*3,0,Math.PI*2);ctx.fill();}
  }
  if(S.game.startTime){
    var el=Math.floor((Date.now()-S.game.startTime)/1000);
    S.game.score=Math.round(m*el*10);
    var gs=q('#gScore');if(gs)gs.textContent=S.game.score;
    var gt2=q('#gTime');if(gt2)gt2.textContent=el+'s';
    var gb=q('#gBrain');if(gb)gb.textContent=Math.round(m*100)+'%';
  }
}

function drawBreath(){
  var c=q('#breathC');if(!c)return;
  c.width=180;c.height=180;
  var ctx=c.getContext('2d'),w=180,h=180;
  ctx.clearRect(0,0,w,h);
  var phase=S.breath.phase,progress=S.breath.progress;
  var scale=phase==='inhale'?progress:phase==='hold'?1:1-progress;
  var R=38+scale*(78-38);
  var col=phase==='inhale'?'#5b8fff':phase==='hold'?'#00ff9d':'#00e5ff';
  var cx=w/2,cy=h/2;
  for(var i=3;i>=1;i--){ctx.strokeStyle=col+h2(12/i*255);ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,R+i*13*(1-scale*.3),0,Math.PI*2);ctx.stroke();}
  var g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  g.addColorStop(0,col+'55');g.addColorStop(.6,col+'18');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  ctx.shadowColor=col;ctx.shadowBlur=15;ctx.strokeStyle=col+'99';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=col;ctx.font='bold 11px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(phase.toUpperCase(),cx,cy+4);ctx.textAlign='left';
  var pl=q('#bPhLbl');if(pl)pl.textContent=phase.charAt(0).toUpperCase()+phase.slice(1);
}

function drawTrend(){
  var c=q('#trendC');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=150;
  var ctx=c.getContext('2d'),w=c.width,h=150;
  ctx.fillStyle='#060d18';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,229,255,0.04)';ctx.lineWidth=1;
  for(var i=0;i<=3;i++){var y=i/3*h;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  var data=S.history.slice().reverse();
  [['alpha','#00e5ff'],['theta','#b060ff'],['beta','#5b8fff']].forEach(function(kc){
    ctx.shadowColor=kc[1];ctx.shadowBlur=7;ctx.strokeStyle=kc[1];ctx.lineWidth=2;ctx.beginPath();
    data.forEach(function(d,i){var x=i/(data.length-1)*w,y=h-d[kc[0]]/45*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.shadowBlur=0;
    data.forEach(function(d,i){var x=i/(data.length-1)*w,y=h-d[kc[0]]/45*h;ctx.fillStyle=kc[1];ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();});
  });
}

function drawSleep(){

  ['Awake','Light','Deep','REM'].forEach(function(l,i){ctx.fillStyle=SLEEPC[3-i]+'bb';ctx.font='8px monospace';ctx.fillText(l,3,(3-i)*bh+10);});

function drawCorrTL(){
  var c=q('#corrTL');if(!c)return;
  c.width=c.parentElement.offsetWidth||500;c.height=120;
  var ctx=c.getContext('2d'),w=c.width,h=120;
  ctx.fillStyle='#060d18';ctx.fillRect(0,0,w,h);
  var pad={t:12,b:20,l:24,r:8},pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
  var d=S.corrData,bw=pw/d.length;
  d.forEach(function(dd,i){
    var x=pad.l+i*bw+bw*.1,bh=dd.score/100*ph;
    var col=dd.had?'#00e5ff':'#2a3a50';
    ctx.fillStyle=col+(dd.had?'30':'20');ctx.fillRect(x,pad.t+ph-bh,bw*.8,bh);
    ctx.fillStyle=col+(dd.had?'90':'40');ctx.fillRect(x,pad.t+ph-bh,bw*.8,2);
  });
}

function drawCorrSC(){
  var c=q('#corrSC');if(!c)return;
  c.width=c.parentElement.offsetWidth||300;c.height=150;
  var ctx=c.getContext('2d'),w=c.width,h=150;
  ctx.fillStyle='#0a1525';ctx.fillRect(0,0,w,h);
  var pts=S.corrData.filter(function(d){return d.al&&d.score;});
  if(pts.length<2)return;
  var xv=pts.map(function(p){return p.al;}),yv=pts.map(function(p){return p.score;});
  var xMin=Math.min.apply(null,xv)*.9,xMax=Math.max.apply(null,xv)*1.05;
  var yMin=Math.min.apply(null,yv)*.9,yMax=Math.max.apply(null,yv)*1.05;
  var pad={t:12,b:24,l:32,r:10},pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
  var toX=function(v){return pad.l+(v-xMin)/(xMax-xMin)*pw;};
  var toY=function(v){return pad.t+ph-(v-yMin)/(yMax-yMin)*ph;};
  pts.forEach(function(p){ctx.fillStyle='#00e5ffaa';ctx.beginPath();ctx.arc(toX(p.al),toY(p.score),5,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#5a7a9a';ctx.font='9px monospace';ctx.fillText('Alpha % ->', pad.l,h-4);
}

      else{S.breath.phase='exhale';S.breath.progress=(ms-(bp.inhale+bp.hold)*1000)/(bp.exhale*1000);}

    },50);

function buildSidebar(){

  '<div class="g4">'+ACHS.map(function(a){return '<div class="ac'+(a.ul?' ul':' lk')+'"><div class="an" style="color:'+(a.ul?'var(--gd)':'var(--t3)')+'">'+a.nm+'</div><div class="ad">'+a.ds+'</div><div class="axp">+'+a.xp+' XP</div></div>';}).join('')+'</div>'+
  '</div></div>'+
  '<div class="pn"><div class="ph"><span class="pt">Progress</span></div><div class="pbd" style="display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center">'+
  '<div style="text-align:center"><div style="font-family:monospace;font-size:44px;font-weight:800;color:var(--gd)">Lv'+S.level+'</div><div style="font-size:9px;color:var(--t3);margin-top:3px">'+S.xp+' XP</div></div>'+
  '<div>'+
  '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:var(--gd)">LVL '+S.level+'</span><span style="font-family:monospace;font-size:9px;color:var(--t3)">'+S.xp+' XP</span></div>'+
  '<div style="height:3px;background:var(--bg);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+((S.xp%500)/5)+'%;background:var(--gd);border-radius:2px"></div></div>'+
  '<div style="font-size:10px;color:var(--t2);margin-top:9px;line-height:1.7">Complete sessions, journal entries, and games to earn XP.</div>'+
  '</div></div></div></div>';
}

// Init
function init(){
  buildSidebar();
  buildMain();
  renderJournal();
  setTimeout(function(){drawSleep();drawTrend();},200);
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
</script></body></html>
